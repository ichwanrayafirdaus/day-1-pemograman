<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Toko Kita</title>

<style>
body{
  margin:0;
  font-family:sans-serif;
  background:#f1f5f9;
}

/* HERO */
.hero{
  background:linear-gradient(135deg,#1d4ed8,#2563eb);
  color:white;
  padding:30px 20px 60px;
  border-bottom-left-radius:25px;
  border-bottom-right-radius:25px;
}

.big{
  font-size:30px;
  font-weight:bold;
  margin-top:10px;
}

/* MENU */
.menu{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:10px;
  padding:15px;
}

.menu-item{
  background:white;
  border-radius:12px;
  padding:10px;
  text-align:center;
}

/* BUTTON */
.btn{
  margin:15px;
  padding:12px;
  width:90%;
  border:none;
  border-radius:10px;
  background:#2563eb;
  color:white;
  font-size:16px;
}
</style>
</head>

<body>

<div class="hero">
  <h1>Usaha Makin Lancar</h1>
  <div class="big">Kelola dengan Toko Kita</div>
</div>

<div class="menu">
  <div class="menu-item">📒<br>Utang</div>
  <div class="menu-item">💰<br>Transaksi</div>
  <div class="menu-item">📦<br>Stok</div>
  <div class="menu-item">📊<br>Laporan</div>
</div>

<button class="btn" onclick="goApp()">
  YUK MENGATUR KEUANGANMU
</button>

<script>
function goApp(){
  window.location.href="index.html";
}
</script>

</body>
</html>
