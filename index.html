<!DOCTYPE html>
<html lang="id">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Toko Kita</title>

  <!-- CSS -->
  <link rel="stylesheet" href="assets/style.css">

  <!-- PWA -->
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#4F46E5">

  <!-- ICON -->
  <link rel="icon" href="icons/favicon.png">

</head>

<body>

  <!-- HEADER -->
  <header class="header">
    <div class="logo">
      <img src="icons/logo.png" alt="Toko Kita" width="140">
    </div>
    <p>Aplikasi pengelola keuangan bisnis</p>
  </header>

  <!-- MAIN -->
  <main class="main">
    <div class="card">

      <h2>Tambah Transaksi</h2>

      <!-- JENIS -->
      <select id="type">
        <option value="income">Pemasukan</option>
        <option value="expense">Pengeluaran</option>
      </select>

      <!-- JUMLAH -->
      <input type="number" id="amount" placeholder="Masukkan jumlah">

      <!-- BUTTON -->
      <button onclick="addTransaction()">Simpan</button>

      <!-- SALDO -->
      <div class="balance" id="balance">
        Rp 0
      </div>

      <!-- LIST -->
      <div class="list" id="list"></div>

    </div>
  </main>

  <!-- FOOTER -->
  <footer class="footer">
    <p>© 2026 Toko Kita</p>
  </footer>

  <!-- SCRIPT -->
  <script>
    let transactions = JSON.parse(localStorage.getItem("data")) || [];

    function updateUI() {
      const list = document.getElementById("list");
      const balance = document.getElementById("balance");

      list.innerHTML = "";
      let total = 0;

      transactions.forEach(item => {
        const div = document.createElement("div");
        div.classList.add("list-item");

        const sign = item.type === "income" ? "+" : "-";

        if (item.type === "income") {
          total += item.amount;
        } else {
          total -= item.amount;
        }

        div.innerHTML = `
          <span>${item.type === "income" ? "Pemasukan" : "Pengeluaran"}</span>
          <span>${sign} Rp ${item.amount}</span>
        `;

        list.appendChild(div);
      });

      balance.innerText = "Rp " + total;
      localStorage.setItem("data", JSON.stringify(transactions));
    }

    function addTransaction() {
      const type = document.getElementById("type").value;
      const amount = parseInt(document.getElementById("amount").value);

      if (!amount) return alert("Isi jumlah dulu!");

      transactions.push({ type, amount });
      document.getElementById("amount").value = "";

      updateUI();
    }

    updateUI();

    // SERVICE WORKER
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('./service-worker.js')
        .then(() => console.log('SW aktif'))
        .catch(err => console.log(err));
    }
  </script>

</body>
</html>
