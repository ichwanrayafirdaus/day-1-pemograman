<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Toko Kita App</title>

<style>
body{
  margin:0;
  font-family:sans-serif;
  background:linear-gradient(135deg,#4f46e5,#9333ea);
  color:white;
}

/* LOGIN */
.login{
  max-width:350px;
  margin:100px auto;
  background:white;
  color:black;
  padding:20px;
  border-radius:15px;
  text-align:center;
}

input{
  width:100%;
  padding:10px;
  margin-top:10px;
  border-radius:10px;
  border:1px solid #ccc;
}

/* HEADER */
.header{
  padding:20px;
}

/* MENU */
.menu{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:10px;
  padding:15px;
}

.menu-item{
  background:white;
  color:black;
  border-radius:12px;
  padding:10px;
  text-align:center;
  cursor:pointer;
}

/* CARD */
.card{
  background:white;
  color:black;
  margin:15px;
  padding:15px;
  border-radius:15px;
}

/* BUTTON */
button{
  width:100%;
  padding:10px;
  margin-top:10px;
  border:none;
  border-radius:10px;
  background:#4f46e5;
  color:white;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginPage" class="login">
  <h2>Login</h2>
  <input id="username" placeholder="Nama Toko">
  <input id="email" placeholder="Email">
  <button onclick="login()">Masuk</button>
</div>

<!-- APP -->
<div id="app" style="display:none;">
  <div class="header">
    <h2 id="welcome"></h2>
    <button onclick="logout()">Logout</button>
  </div>

  <div class="menu">
    <div class="menu-item" onclick="showPage('transaksi')">💰</div>
    <div class="menu-item" onclick="showPage('utang')">📒</div>
    <div class="menu-item" onclick="showPage('laporan')">📊</div>
  </div>

  <div id="content"></div>
</div>

<script>
let data=[];
let utang=[];

function login(){
  localStorage.setItem("user",username.value);
  loadApp();
}

function logout(){
  localStorage.clear();
  location.reload();
}

function loadApp(){
  if(localStorage.getItem("user")){
    loginPage.style.display="none";
    app.style.display="block";
    welcome.innerText="Halo, "+localStorage.getItem("user");
    showPage("transaksi");
  }
}

function showPage(p){
if(p==="transaksi"){
content.innerHTML=`
<div class="card">
<input id="amount" type="number">
<button onclick="add()">Tambah</button>
</div>
<div class="card" id="list"></div>
`;
render();
}

if(p==="utang"){
content.innerHTML=`
<div class="card">
<input id="nama">
<input id="jumlah" type="number">
<button onclick="addUtang()">Tambah</button>
</div>
<div class="card" id="utangList"></div>
`;
renderUtang();
}

if(p==="laporan"){
content.innerHTML=`<div class="card">Total: ${data.length}</div>`;
}
}

function add(){
data.push(parseInt(amount.value));
render();
}

function render(){
list.innerHTML="";
data.forEach(d=>{
list.innerHTML+=`<div>Rp ${d}</div>`;
});
}

function addUtang(){
utang.push({n:nama.value,j:jumlah.value});
renderUtang();
}

function renderUtang(){
utangList.innerHTML="";
utang.forEach(u=>{
utangList.innerHTML+=`<div>${u.n} - ${u.j}</div>`;
});
}

loadApp();
</script>

</body>
</html>
