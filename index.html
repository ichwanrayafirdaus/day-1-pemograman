<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="TOKO KITA - Aplikasi Manajemen Keuangan UMKM">
<meta name="theme-color" content="#1565C0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="TOKO KITA">
<title>TOKO KITA - Manajemen Keuangan UMKM</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&family=Nunito:wght@400;500;600;700&display=swap" rel="stylesheet">

<link rel="manifest" href="manifest.json">

<link rel="stylesheet" href="style.css">

</head>
<body>

<div id="loading-overlay">
  <div class="loading-spinner">
    <div class="spinner-ring"></div>
    <p>Memuat TOKO KITA...</p>
  </div>
</div>

<div id="toast-container"></div>

<div id="auth-screen">
  <div class="auth-card">
    <div class="auth-logo">
      <div class="logo-icon"><i class="bi bi-shop"></i></div>
      <h1>TOKO KITA</h1>
      <p>Kelola keuangan usaha Anda dengan mudah</p>
    </div>
    <div class="auth-tabs">
      <button class="auth-tab active" onclick="switchAuthTab('login')">Masuk</button>
      <button class="auth-tab" onclick="switchAuthTab('register')">Daftar</button>
    </div>

    <div id="login-form">
      <div class="mb-3">
        <label class="form-label">Email</label>
        <input type="email" class="form-control" id="login-email" placeholder="nama@email.com">
      </div>
      <div class="mb-3">
        <label class="form-label">Password</label>
        <div class="input-group">
          <input type="password" class="form-control" id="login-password" placeholder="Min. 6 karakter">
          <button class="input-group-text" onclick="togglePwd('login-password', this)"><i class="bi bi-eye"></i></button>
        </div>
      </div>
      <div class="mb-3 d-flex align-items-center justify-content-between">
        <div class="form-check">
          <input class="form-check-input" type="checkbox" id="remember-me">
          <label class="form-check-label" for="remember-me" style="font-size:0.85rem; color:var(--text-secondary);">Ingat saya</label>
        </div>
      </div>
      <button class="btn-primary-custom" onclick="doLogin()"><i class="bi bi-box-arrow-in-right me-2"></i>Masuk</button>
    </div>

    <div id="register-form" style="display:none">
      <div class="mb-3">
        <label class="form-label">Nama Lengkap</label>
        <input type="text" class="form-control" id="reg-name" placeholder="Nama Anda">
      </div>
      <div class="mb-3">
        <label class="form-label">Email</label>
        <input type="email" class="form-control" id="reg-email" placeholder="nama@email.com">
      </div>
      <div class="mb-3">
        <label class="form-label">Password</label>
        <div class="input-group">
          <input type="password" class="form-control" id="reg-password" placeholder="Min. 6 karakter">
          <button class="input-group-text" onclick="togglePwd('reg-password', this)"><i class="bi bi-eye"></i></button>
        </div>
      </div>
      <div class="mb-3">
        <label class="form-label">Konfirmasi Password</label>
        <input type="password" class="form-control" id="reg-confirm" placeholder="Ulangi password">
      </div>
      <button class="btn-primary-custom" onclick="doRegister()"><i class="bi bi-person-plus me-2"></i>Daftar Sekarang</button>
    </div>
  </div>
</div>

<div id="app-screen">
  <div class="sidebar-backdrop" id="sidebar-backdrop" onclick="closeSidebar()"></div>
  
  <nav class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <div class="sidebar-brand">
        <div class="brand-icon"><i class="bi bi-shop text-white"></i></div>
        <span>TOKO KITA</span>
      </div>
    </div>
    <div class="sidebar-user">
      <div class="user-avatar" id="sidebar-avatar">TK</div>
      <div class="user-info">
        <div class="user-name" id="sidebar-name">Pengguna</div>
        <div class="user-email" id="sidebar-email">-</div>
      </div>
    </div>
    <div class="nav-section">
      <div class="nav-section-title">Menu Utama</div>
      <button class="nav-item active" onclick="navigate('dashboard')"><i class="bi bi-speedometer2"></i> Dashboard</button>
      <button class="nav-item" onclick="navigate('transaksi')"><i class="bi bi-arrow-left-right"></i> Transaksi</button>
      <button class="nav-item" onclick="navigate('utang')"><i class="bi bi-people"></i> Utang Pelanggan</button>
      <button class="nav-item" onclick="navigate('laporan')"><i class="bi bi-bar-chart-line"></i> Laporan</button>
    </div>
    <div class="sidebar-footer">
      <button class="btn-logout" onclick="doLogout()"><i class="bi bi-box-arrow-left"></i> Keluar</button>
    </div>
  </nav>

  <div class="main-content" id="main-content">
    <div class="top-bar">
      <div class="top-bar-left">
        <button class="btn-toggle" onclick="toggleSidebar()"><i class="bi bi-list"></i></button>
        <span class="page-title" id="page-title">Dashboard</span>
      </div>
      <div class="top-bar-right">
        <button class="btn-theme" onclick="toggleTheme()" title="Ganti Tema"><i class="bi bi-moon-stars" id="theme-icon"></i></button>
      </div>
    </div>

    <div class="page-content">

      <div class="section-page active" id="page-dashboard">
        <div class="row g-3 mb-4">
          <div class="col-6 col-md-3">
            <div class="stat-card income">
              <div class="stat-icon income"><i class="bi bi-arrow-down-circle"></i></div>
              <div class="stat-label">Pemasukan</div>
              <div class="stat-value income" id="stat-income">Rp 0</div>
            </div>
          </div>
          <div class="col-6 col-md-3">
            <div class="stat-card expense">
              <div class="stat-icon expense"><i class="bi bi-arrow-up-circle"></i></div>
              <div class="stat-label">Pengeluaran</div>
              <div class="stat-value expense" id="stat-expense">Rp 0</div>
            </div>
          </div>
          <div class="col-6 col-md-3">
            <div class="stat-card profit">
              <div class="stat-icon profit"><i class="bi bi-graph-up-arrow"></i></div>
              <div class="stat-label">Laba / Rugi</div>
              <div class="stat-value profit" id="stat-profit">Rp 0</div>
            </div>
          </div>
          <div class="col-6 col-md-3">
            <div class="stat-card debt">
              <div class="stat-icon debt"><i class="bi bi-person-lines-fill"></i></div>
              <div class="stat-label">Total Utang</div>
              <div class="stat-value debt" id="stat-debt">Rp 0</div>
            </div>
          </div>
        </div>

        <div class="card-custom mb-4">
          <div class="card-header-custom"><h5><i class="bi bi-lightning-charge me-2"></i>Aksi Cepat</h5></div>
          <div class="card-body-custom">
            <div class="quick-actions">
              <button class="quick-btn income-btn" onclick="openTrxModal('income')">
                <i class="bi bi-plus-circle-fill"></i>
                <span>Tambah Pemasukan</span>
              </button>
              <button class="quick-btn expense-btn" onclick="openTrxModal('expense')">
                <i class="bi bi-dash-circle-fill"></i>
                <span>Tambah Pengeluaran</span>
              </button>
              <button class="quick-btn debt-btn" onclick="navigate('utang')">
                <i class="bi bi-people-fill"></i>
                <span>Data Utang</span>
              </button>
              <button class="quick-btn report-btn" onclick="navigate('laporan')">
                <i class="bi bi-file-earmark-bar-graph-fill"></i>
                <span>Lihat Laporan</span>
              </button>
            </div>
          </div>
        </div>

        <div class="row g-3">
          <div class="col-md-6">
            <div class="card-custom h-100">
              <div class="card-header-custom"><h5><i class="bi bi-bar-chart me-2"></i>Grafik Keuangan</h5></div>
              <div class="card-body-custom">
                <div class="chart-bar-wrap" id="chart-bars"></div>
                <div class="chart-legend">
                  <div class="chart-legend-item"><div class="chart-dot" style="background:var(--success)"></div>Pemasukan</div>
                  <div class="chart-legend-item"><div class="chart-dot" style="background:var(--danger)"></div>Pengeluaran</div>
                </div>
              </div>
            </div>
          </div>
          <div class="col-md-6">
            <div class="card-custom h-100">
              <div class="card-header-custom">
                <h5><i class="bi bi-clock-history me-2"></i>Transaksi Terbaru</h5>
                
                </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('./service-worker.js')
        .then(registration => {
          console.log('ServiceWorker registration successful');
        })
        .catch(err => {
          console.log('ServiceWorker registration failed: ', err);
        });
    });
  }
</script>
</body>
</html>
